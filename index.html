<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathology Lab Booking</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(rgba(244, 247, 246, 0.85), rgba(244, 247, 246, 0.85)), url('https://images.unsplash.com/photo-1579154204601-01588f351e67?auto=format&fit=crop&q=80&w=2000') no-repeat center center fixed;
            background-size: cover;
            padding: 20px; 
        }
        .form-container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        label { display: block; margin-top: 10px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; background-color: #007bff; color: white; padding: 10px; margin-top: 20px; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #success-msg { display: none; color: green; text-align: center; margin-top: 15px; font-weight: bold; }
        
        /* Styles for Multiple Tests Feature */
        .test-row { display: flex; gap: 10px; align-items: center; margin-top: 5px; }
        .test-row input { margin-top: 0; } 
        #addTestBtn { background-color: #28a745; margin-top: 10px; padding: 8px; font-size: 14px; width: auto; }
        #addTestBtn:hover { background-color: #218838; }
        .remove-btn { background-color: #dc3545; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; width: auto; margin-top: 0; }
        .remove-btn:hover { background-color: #c82333; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Inquiry form for Lab Test Booking</h2>
    <form id="bookingForm">
        <label>Patient Name</label>
        <input type="text" name="name" required placeholder="John Doe">

        <label>Phone Number</label>
        <input type="tel" name="phone" required pattern="[0-9]{10}" maxlength="10" minlength="10" title="Please enter exactly 10 digits" placeholder="9876543210">

        <label>Test(s) Needed</label>
        <div id="testsContainer">
            <div class="test-row">
                <input list="testOptions" class="test-input" required placeholder="Search or select a test...">
            </div>
        </div>
        
        <button type="button" id="addTestBtn">+ Add Another Test</button>

        <input type="hidden" name="test" id="allTestsHidden">

        <datalist id="testOptions">
            <option value="Lipid Profile Advance">
            <option value="LFT">
            <option value="CBC">
            <option value="Thyroid Profile">
            <option value="Iron Studies">
            <option value="KFT Advance">
            <option value="HbA1c">
            <option value="Urine RM">
            <option value="Urine CS">
            <option value="Ferritin">
            <option value="Hemoglobin Hb">
            <option value="Malarial Antigen, Vivax & Falciparum">
            <option value="Typhi Dot IgM, IgG">
            <option value="Vitamin B12 Cyanocobalamin">
            <option value="Vitamin D Total-25 Hydroxy">
            <option value="Random Blood Sugar">
            <option value="BLOOD SUGAR (POST PRANDIAL)">
            <option value="Dengue NS1 Antigen (Immunoassay)">
            <option value="HIV 1&2 Antibodies">
            <option value="Full Body Package">
            <option value="Full Body Package Premium">
            <option value="Gym Health Package-Male">
            <option value="Gym Health Package- Female">
            <option value="TSH">
            <option value="Fertility Basic">
            <option value="Fever Panel Basic">
            <option value="FEVER ADVANCE PANEL">
            <option value="PCOD Comprehensive">
            <option value="Electrolytes Profile">
            <option value="Bilirubin Profile">
            <option value="Iron Studies With Ferritin">
            <option value="Blood Group Profile ABO & Rh Typing (manual), Blood">
            <option value="VDRL CSF">
            <option value="Vitamin A Retinol">
            <option value="Vitamin B1 Thiamine">
            <option value="Vitamin B2 Riboflavin">
            <option value="Vitamin B6 Pyridoxal Phosphate Blood">
            <option value="Vitamin C Ascorbic Acid">
            <option value="Vitamin D-1,25-Dihydroxy">
            <option value="Vitamin E Tocopherol">
            <option value="Vitamin K1">
            <option value="Other">
        </datalist>

        <label>Preferred Date</label>
        <input type="date" name="date" id="dateInput" required>

        <button type="submit" id="submitBtn">Confirm Booking</button>
        <div id="success-msg">Booking successful, we will call you shortly.</div>
    </form>
</div>

<script>
    // --- NEW LOGIC: Disable past dates in the date picker ---
    const dateInput = document.getElementById('dateInput');
    const today = new Date().toISOString().split('T')[0];
    dateInput.setAttribute('min', today);
    // --------------------------------------------------------

    const form = document.getElementById('bookingForm');
    const testsContainer = document.getElementById('testsContainer');
    const addTestBtn = document.getElementById('addTestBtn');

    // Logic to add a new test row
    addTestBtn.addEventListener('click', () => {
        const row = document.createElement('div');
        row.className = 'test-row';
        row.innerHTML = `
            <input list="testOptions" class="test-input" required placeholder="Search or select a test...">
            <button type="button" class="remove-btn">X</button>
        `;
        testsContainer.appendChild(row);

        // Logic to remove a test row
        row.querySelector('.remove-btn').addEventListener('click', () => {
            row.remove();
        });
    });
    
    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // Combine all selected tests into a single string
        const testInputs = document.querySelectorAll('.test-input');
        const testArray = Array.from(testInputs)
            .map(input => input.value)
            .filter(val => val.trim() !== ""); // Filter out any empty boxes
        
        // Save the combined list into the hidden input
        document.getElementById('allTestsHidden').value = testArray.join(", ");

        document.getElementById('submitBtn').innerText = "Booking...";
        
        // PASTE YOUR GOOGLE SCRIPT URL BELOW
        const scriptURL = 'https://script.google.com/macros/s/AKfycbz8mKGTwXc9Yk1p7JvpmCajaHBZrmOH9O2zhXT8-mBSglF9sX_li-k0r9ibNbq8M7F4/exec';
        
        fetch(scriptURL, { method: 'POST', body: new FormData(form) })
            .then(response => {
                document.getElementById('success-msg').style.display = 'block';
                document.getElementById('submitBtn').innerText = "Confirm Booking";
                
                // Reset form and remove any extra dynamically added test rows
                form.reset();
                testsContainer.innerHTML = `
                    <div class="test-row">
                        <input list="testOptions" class="test-input" required placeholder="Search or select a test...">
                    </div>
                `;
            })
            .catch(error => {
                alert('There was an error! Please try again.');
                document.getElementById('submitBtn').innerText = "Confirm Booking";
            });
    });
</script>

</body>
</html>
